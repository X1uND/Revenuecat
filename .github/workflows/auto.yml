name: sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download
        run: |
          curl -L https://raw.githubusercontent.com/chxm1023/Rewrite/main/Reheji.js -o Revenuecat.js
          ls -la

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add Revenuecat.js
          git commit -m "sync"
          git push
